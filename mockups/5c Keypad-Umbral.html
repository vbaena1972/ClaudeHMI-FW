<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>5c · Keypad-Umbral</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  html,body{margin:0;height:100%}
  body{background:#0c0c0e;display:flex;align-items:center;justify-content:center;font-family:system-ui,Segoe UI,Roboto,sans-serif}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div style="background:#202227;border-radius:24px;padding:10px;box-shadow:0 18px 50px rgba(0,0,0,.55)">
       <div style="background:#0f1115;border-radius:18px;padding:7px;border:1px solid rgba(255,255,255,.06)">
        <div style="width:480px;height:320px;background:#15181e;border-radius:12px;overflow:hidden;color:#eef0f3;display:flex;padding:12px 15px;box-sizing:border-box;gap:16px">
          <div style="flex:1;display:flex;flex-direction:column">
            <div style="display:flex;align-items:center;gap:8px"><i class="ti ti-gauge" style="font-size:18px;color:#f87171"></i><span style="font-size:14px;font-weight:600">Presión · Umbral máximo</span></div>
            <div style="background:#12181f;border:1px solid rgba(248,113,113,.4);border-radius:12px;padding:14px 16px;margin-top:12px;display:flex;align-items:baseline;justify-content:center;gap:8px">
              <span style="font-size:46px;font-weight:600;line-height:.9;color:#f1f3f5">2000</span><span style="font-size:16px;color:#9aa1ab">psi</span>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;font-size:10px;color:#6f767f;margin-top:9px"><span>rango sensor 0–2200</span><span style="color:#34d399">✓ válido</span></div>
            <div style="display:flex;gap:8px;margin-top:auto">
              <span style="flex:1;text-align:center;font-size:11px;font-weight:600;color:#cfd3d9;background:#191c22;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:9px 0">Cancelar</span>
              <span style="flex:1;text-align:center;font-size:11px;font-weight:700;color:#06251f;background:#34d399;border-radius:9px;padding:9px 0">Aceptar</span>
            </div>
          </div>
          <div style="flex:0 0 200px;display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;gap:6px">
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">1</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">2</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">3</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">4</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">5</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">6</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">7</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">8</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">9</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:16px;color:#9aa1ab;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">C</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px">0</span>
            <span style="display:flex;align-items:center;justify-content:center;color:#cfd3d9;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:9px;min-height:50px"><i class="ti ti-backspace" style="font-size:19px"></i></span>
          </div>
        </div>
       </div>
      </div>
</body>
</html>
