<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>5a · PinDialog</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  html,body{margin:0;height:100%}
  body{background:#0c0c0e;display:flex;align-items:center;justify-content:center;font-family:system-ui,Segoe UI,Roboto,sans-serif}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div style="background:#202227;border-radius:24px;padding:10px;box-shadow:0 18px 50px rgba(0,0,0,.55)">
       <div style="background:#0f1115;border-radius:18px;padding:7px;border:1px solid rgba(255,255,255,.06)">
        <div style="width:480px;height:320px;background:#15181e;border-radius:12px;overflow:hidden;color:#eef0f3;display:flex;padding:14px 16px;box-sizing:border-box;gap:18px">
          <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
            <span style="width:38px;height:38px;border-radius:10px;background:rgba(52,211,153,.14);display:flex;align-items:center;justify-content:center;color:#34d399"><i class="ti ti-lock" style="font-size:22px"></i></span>
            <div style="font-size:18px;font-weight:600;margin-top:14px">Acceso protegido</div>
            <div style="font-size:11px;color:#8b929c;margin-top:4px;line-height:1.45">Introduce el PIN de servicio para cambiar parámetros críticos.</div>
            <div style="display:flex;gap:11px;margin-top:20px">
              <span style="width:16px;height:16px;border-radius:50%;background:#34d399"></span>
              <span style="width:16px;height:16px;border-radius:50%;background:#34d399"></span>
              <span style="width:16px;height:16px;border-radius:50%;background:#34d399"></span>
              <span style="width:16px;height:16px;border-radius:50%;border:2px solid #3a3f47;box-sizing:border-box"></span>
            </div>
            <div style="font-size:9.5px;color:#6f767f;margin-top:18px;display:flex;align-items:center;gap:6px"><i class="ti ti-shield-lock"></i>Cambios se registran con RTC y usuario</div>
          </div>
          <div style="flex:0 0 210px;display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;gap:7px">
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">1</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">2</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">3</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">4</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">5</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">6</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">7</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">8</span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">9</span>
            <span style="display:flex;align-items:center;justify-content:center;color:#6f767f;background:transparent;border-radius:10px;min-height:54px"><i class="ti ti-arrow-back-up" style="font-size:19px"></i></span>
            <span style="display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:500;background:#191c22;border:1px solid rgba(255,255,255,.08);border-radius:10px;min-height:54px">0</span>
            <span style="display:flex;align-items:center;justify-content:center;color:#9fe1cb;background:#12261f;border:1px solid #1f7d5c;border-radius:10px;min-height:54px"><i class="ti ti-check" style="font-size:22px"></i></span>
          </div>
        </div>
       </div>
      </div>
</body>
</html>
